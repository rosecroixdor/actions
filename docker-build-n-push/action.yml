name: Docker build and push
description: Build and push docker image to GitHub Container Registry

inputs:
  image_name:
    description: Docker image name (for example api-rco)
    required: false
    default: ${{ github.event.repository.name }}
  version:
    description: Docker image version (for example 0.1.5)
    required: false
    default: ${{ github.event.inputs.version || github.ref_name }}
  dockerfile:
    description: Path to the Dockerfile
    required: false
    default: Dockerfile
  context:
    description: Build context
    required: false
    default: .

runs:
  using: composite
  steps:
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}
    - name: Compute image variables
      id: vars
      shell: bash
      run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

    - name: Show image variables
      shell: bash
      run: |
        echo "Tag actuel : ${{ inputs.version }}"
        echo "Short SHA : ${{ steps.vars.outputs.short_sha }}"

    - name: Build and push image
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:latest
          ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ inputs.version }}
          ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ steps.vars.outputs.short_sha }}
    - name: Delete old packages
      uses: actions/delete-package-versions@v5
      with:
        package-name: ${{ inputs.image_name }}
        package-type: 'container'
        min-versions-to-keep: 3
        delete-only-untagged-versions: false